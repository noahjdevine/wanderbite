name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Build needs these to resolve; values don't have to be real for build,
          # since pages with `cookies()` etc. are dynamic.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
          SUPABASE_SERVICE_ROLE_KEY: dummy
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_PRICE_ID: price_dummy
          REDEMPTION_CODE_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          NEXT_PUBLIC_BASE_URL: https://wanderbite.com
          NEXT_PUBLIC_SITE_URL: https://wanderbite.com
          CRON_SECRET: dummy
          ANTHROPIC_API_KEY: dummy
